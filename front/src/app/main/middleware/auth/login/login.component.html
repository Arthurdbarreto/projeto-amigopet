<div class="surface-ground flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <div style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8" style="border-radius:53px">
                <div class="text-center mb-5">
                    <div class="text-900 text-3xl font-medium mb-3">AmigoPet</div>
                    <span class="text-600 font-medium">Entre com sua conta</span>
                </div>
                <div>
                    <label for="username" class="block text-900 text-xl font-medium mb-2">Usuário</label>
                    <input id="username" type="text" pInputText placeholder="Usuário" class="w-full md:w-30rem mb-5" style="padding:1rem" [(ngModel)]="username">

                    <label for="password" class="block text-900 font-medium text-xl mb-2">Senha</label>
                    <p-password id="password" [(ngModel)]="password" placeholder="Senha" [toggleMask]="true" styleClass="mb-5 w-full" inputStyleClass="w-full p-3" [feedback]="false"></p-password>

                    <p-button label="Entrar" styleClass="w-full p-3 text-xl" [loading]="loading" (click)="login()"></p-button>
                </div>
            </div>
        </div>
    </div>
</div>
<p-toast></p-toast>
